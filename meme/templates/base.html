<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      .navbar {
        background-color: #232634;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }
      .navbar .nav-link,
      .navbar-brand {
        color: #91d7e3 !important;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .navbar .nav-link:hover {
        color: #ffffff !important;
      }
      body {
        font-family: 'Space Grotesk', sans-serif;
        padding-top: 70px;
      }
      html,
      body {
        height: 100%;
      }
      
      body {
        font-family: 'Space Grotesk', sans-serif;
        padding-top: 70px;
      
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      
      main.content {
        flex: 1; 
      }
      
      footer {
        background-color: #232634;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        padding: 30px 0 15px;
        border-top: 1px solid #e7e7e7;
      }
      
      footer p {
        color: #babbf1;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}">Memes</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav mx-auto">
            <a class="nav-link" href="{% url 'home' %}">Home</a>
            <a class="nav-link" href="{% url 'post' %}">Post</a>
            <a class="nav-link" href="{% url 'view' %}">View</a>
          </div>
        </div>
      </div>
    </nav>
    <main class="content">
      {% block content %}

      {% endblock %}
    </main>

    <footer>
      <div class="container text-center">
        <p>© 2026 Friend's Meme | Made with Momin Rifat</p>
      </div>
    </footer>
  </body>
</html>
