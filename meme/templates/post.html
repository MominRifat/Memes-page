{% extends 'base.html' %}

{% block content %}
  <style>
    .upload-page {
      background: #181926;
      min-height: 100vh;
      width: 100%;
      padding: 20px 10px;
      margin-top: -20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .upload-box {
      width: 400px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }
  
    .upload-title {
      color: #ffffff;
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
    }
    
    .upload-box label {
      color: #ffffff;
      font-weight: 500;
      margin-top: 8px;
    }
    .upload-box input {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: white;
      padding: 8px;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 10px;
    }
    
    .upload-box input:focus {
      outline: none;
      box-shadow: 0 0 8px #8caaee;
    }
    button {
      width: 100%;
      margin-top: 10px;
      background: #8caaee;
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: #000;
      font-weight: bold;
    }
    
    button:hover {
      background: #a6c1ff;
    }
    .upload-box p {
      margin-bottom: 10px;
    }
    
    .errorlist {
      display: none;
    }
  </style>

  <div class="upload-page">
    <div class="upload-box">
      <h2 class="upload-title">Upload Meme</h2>
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
      </form>
    </div>
  </div>
{% endblock %}
